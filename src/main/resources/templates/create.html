<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<div class="row justify-content-center">
    <div class="col-md-6 border p-4 shadow-sm rounded bg-light">
        <h3 class="mb-4 text-success">Create Product</h3>
        <form th:action="@{/products/create}" th:object="${product}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-bold">Name:</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tên sản phẩm">
                <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Price:</label>
                <input type="number" th:field="*{price}" class="form-control" placeholder="Nhập giá">
                <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Category:</label>
                <select th:field="*{category.id}" class="form-select">
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Product Image:</label>
                <input type="file" name="imageFile" class="form-control">
                <div class="text-danger small" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
            </div>

            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-success">Add Product</button>
                <a th:href="@{/products}" class="btn btn-outline-secondary">Back to List</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
