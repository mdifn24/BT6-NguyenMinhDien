<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<div class="row justify-content-center">
    <div class="col-md-6 border p-4 shadow-sm rounded bg-light">
        <h3 class="mb-4 text-primary">Edit Product</h3>
        <form th:action="@{/products/update}" th:object="${product}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label fw-bold">Name:</label>
                <input type="text" th:field="*{name}" class="form-control">
                <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Price:</label>
                <input type="number" th:field="*{price}" class="form-control">
                <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Category:</label>
                <select th:field="*{category.id}" class="form-select">
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${product.category != null && cat.id == product.category.id}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Current Image:</label><br>
                <img th:src="@{'/images/' + ${product.image}}" width="120" class="mb-2 rounded border shadow-sm" th:if="${product.image != null}">
                <br>
                <label class="form-label fw-bold">Change New Image (Optional):</label>
                <input type="file" name="imageFile" class="form-control">
                <input type="hidden" th:field="*{image}">
            </div>

            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Update Product</button>
                <a th:href="@{/products}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
